<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Tutor</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #f5efe6;
  color: #1f2937;
}

.container {
  width: 90%;
  max-width: 1100px;
  margin: 0 auto;
}

/* HEADER */
header {
  padding: 20px 0;
}

nav {
  display: flex;
  justify-content: space-between;
}

.logo {
  font-weight: bold;
  font-size: 20px;
}

/* HERO */
.hero {
  padding: 60px 0;
}

.hero-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: center;
}

h1 {
  font-size: 40px;
  margin-bottom: 15px;
}

p {
  color: #6b7280;
  margin-bottom: 20px;
}

/* BUTTONS */
.btn {
  padding: 12px 20px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
  margin-right: 10px;
}

.btn-primary {
  background: black;
  color: white;
}

.btn-secondary {
  border: 1px solid #ccc;
  color: black;
}

/* MACBOOK */
.hero-image {
  display: flex;
  justify-content: center;
}

.macbook {
  width: 400px;
}

.screen {
  background: #d1d5db;
  border: 8px solid black;
  border-radius: 15px;
  padding: 20px;
}

.screen-inner {
  background: white;
  border-radius: 10px;
  padding: 30px;
  text-align: center;
}

.screen-inner h2 {
  margin-bottom: 10px;
}

.base {
  height: 12px;
  background: #ccc;
  border-radius: 0 0 10px 10px;
}

/* MOBILE */
@media (max-width: 768px) {
  .hero-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<header>
  <div class="container">
    <nav>
      <div class="logo">English Tutor</div>
      <div>Меню</div>
    </nav>
  </div>
</header>

<section class="hero">
  <div class="container hero-grid">

    <!-- TEXT -->
    <div>
      <h1>Помогу заговорить на английском</h1>
      <p>Уроки без скуки, простое объяснение и практика с первого занятия.</p>

      <a href="#" class="btn btn-primary">Записаться</a>
      <a href="#" class="btn btn-secondary">Цены</a>
    </div>

    <!-- MACBOOK -->
    <div class="hero-image">
      <div class="macbook">
        <div class="screen">
          <div class="screen-inner">
            <h2>English with confidence</h2>
            <p>Start speaking from your first lesson</p>
          </div>
        </div>
        <div class="base"></div>
      </div>
    </div>

  </div>
</section>

</body>
</html>
